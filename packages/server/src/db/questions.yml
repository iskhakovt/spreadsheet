#
# Tiers:
#   1 = Essentials — every couple should discuss
#   2 = Common — broadly recognized
#   3 = Adventurous — niche but mainstream-aware
#   4 = Edge / Risk — requires expertise / risk-aware
#
# Order = participant-flow order. Categories appear top-to-bottom; within each
# category questions appear in this order. Pre-sex friendly items first,
# then gated content (gated by `requires:` chain).
#
# New optional fields beyond existing schema:
#   - requires: <id>                # single-parent dependency. Hide if parent answered "no" (transitively).
#   - notePrompt: "<text>"          # encourages a free-text note alongside the yes/no/maybe answer.
#                                   # Used as both placeholder text and as a "this question benefits from
#                                   # a note" signal. Notes are allowed on every question; this just
#                                   # surfaces the input prominently for items where a note adds value.
#   - requiresGroupAnatomy: [...]   # anatomies that must all be present in the group composition.
#                                   # Used for items (pregnancy risk, condom norms) that no per-person
#                                   # targetGive/targetReceive combination can express.

categories:
  - id: foundations
    label: Foundations
    description: Communication norms, baseline preferences, mood and timing
  - id: communication
    label: Communication & Language
    description: Words and language used during intimacy
  - id: response
    label: Sexual Response Norms
    description: Pressure-free framings — what's okay to feel, what's okay to skip
  - id: environment
    label: Sensory Environment
    description: Lighting, sound, scent, touch — physical setup and ND-friendly norms
  - id: health
    label: Health & Safer Sex
    description: Barriers, testing, substance use
  - id: reproductive
    label: Reproductive
    description: Pregnancy risk, contraception
  - id: touch
    label: Touch & Body
    description: Body contact — affection, kissing, manual stimulation
  - id: oral
    label: Oral
    description: Oral sex of all kinds
  - id: penetration
    label: Penetration & Positions
    description: Vaginal, anal, positions
  - id: toys
    label: Toys & Accessories
    description: Vibrators, dildos, plugs, rings, restraints
  - id: sensation
    label: Sensation Play
    description: Temperature, texture, sensory deprivation, electrical
  - id: bondage
    label: Bondage & Restraint
    description: Tying, cuffs, restriction of movement
  - id: impact
    label: Impact Play
    description: Spanking, paddling, flogging, caning
  - id: power
    label: Power Exchange
    description: Dominance, submission, control, service
  - id: roleplay
    label: Role Play & Fantasy
    description: Scenarios, costumes, characters
  - id: exhibitionism
    label: Exhibitionism & Voyeurism
    description: Being watched, watching, public
  - id: group
    label: Group & External
