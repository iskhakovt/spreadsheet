version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      # Matches commitlint / semantic-release config. Without this prefix,
      # the pr-title CI job fails on dependabot PRs.
      prefix: "chore(deps)"
    # Group updates so pnpm-lock.yaml only has one merge state to validate
    # at a time. Multiple overlapping PRs touching the lockfile can produce
    # a corrupted lockfile because GitHub's textual auto-rebase runs per
    # merge and isn't lockfile-aware. Grouping collapses that into a single
    # PR with one semantically-resolved lockfile.
    #
    # Majors stay ungrouped — they deserve individual review.
    # Security and version updates can't share a group (Dependabot rule),
    # hence the security group.
    #
    # Family-specific groups precede the catch-alls so peer-dep-coupled
    # packages (tanstack, trpc, drizzle, etc.) merge into a single PR even
    # when Dependabot's broad grouping splits them — observed with
    # @tanstack/react-query + devtools and @trpc/client + tanstack-react-query
    # arriving as separate PRs despite matching npm-minor.
    groups:
      tanstack:
        applies-to: version-updates
        patterns: ["@tanstack/*"]
        update-types: ["minor", "patch"]
      trpc:
        applies-to: version-updates
        patterns: ["@trpc/*"]
        update-types: ["minor", "patch"]
      sentry:
        applies-to: version-updates
        patterns: ["@sentry/*"]
        update-types: ["minor", "patch"]
      hono:
        applies-to: version-updates
        patterns: ["hono", "@hono/*"]
        update-types: ["minor", "patch"]
      drizzle:
        applies-to: version-updates
        patterns: ["drizzle-orm", "drizzle-kit"]
        update-types: ["minor", "patch"]
      testcontainers:
        applies-to: version-updates
        patterns: ["testcontainers", "@testcontainers/*"]
        update-types: ["minor", "patch"]
      vite:
        applies-to: version-updates
        patterns: ["vite", "@vitejs/*", "vite-plugin-*", "@tailwindcss/vite"]
        update-types: ["minor", "patch"]
      vitest:
        applies-to: version-updates
        patterns: ["vitest", "@vitest/*", "vitest-mock-extended"]
        update-types: ["minor", "patch"]
      react:
        applies-to: version-updates
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
        update-types: ["minor", "patch"]
      pino:
        applies-to: version-updates
        patterns: ["pino", "pino-pretty"]
        update-types: ["minor", "patch"]
      testing-library:
        applies-to: version-updates
        patterns: ["@testing-library/*"]
        update-types: ["minor", "patch"]
      stylelint:
        applies-to: version-updates
        patterns: ["stylelint", "stylelint-*", "@dreamsicle.io/stylelint-*"]
        update-types: ["minor", "patch"]
      npm-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["patch"]
      npm-minor:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor"]
      npm-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Block Node major bumps. Dependabot has no LTS awareness and will
      # happily PR odd-numbered releases (which never become LTS), and
      # base-image majors tend to bring breaking changes (e.g. corepack
      # being removed from the distribution) that need human review.
      # Bump Node majors by hand once a year when the next even-numbered
      # LTS ships.
      - dependency-name: node
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
