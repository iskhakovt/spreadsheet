version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      # Matches commitlint / semantic-release config. Without this prefix,
      # the pr-title CI job fails on dependabot PRs.
      prefix: "chore(deps)"
    # Group updates so pnpm-lock.yaml only has one merge state to validate
    # at a time. Multiple overlapping PRs touching the lockfile can produce
    # a corrupted lockfile because GitHub's textual auto-rebase runs per
    # merge and isn't lockfile-aware. Grouping collapses that into a single
    # PR with one semantically-resolved lockfile.
    #
    # Majors stay ungrouped — they deserve individual review.
    # Security and version updates can't share a group (Dependabot rule),
    # hence the third group.
    groups:
      npm-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["patch"]
      npm-minor:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor"]
      npm-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Block Node major bumps. Dependabot has no LTS awareness and will
      # happily PR odd-numbered releases (which never become LTS), and
      # base-image majors tend to bring breaking changes (e.g. corepack
      # being removed from the distribution) that need human review.
      # Bump Node majors by hand once a year when the next even-numbered
      # LTS ships.
      - dependency-name: node
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
