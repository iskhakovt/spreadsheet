name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Deny-by-default; each job grants what it needs.
permissions: {}

jobs:
  pr-title:
    name: PR Title
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate Conventional Commits format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          echo "$PR_TITLE" | npx --yes \
            -p @commitlint/cli@20.5.0 \
            -p @commitlint/config-conventional@20.5.0 \
            commitlint

  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @spreadsheet/shared build
      - run: pnpm --filter @spreadsheet/server run typecheck
      - run: pnpm -r typecheck
      - run: pnpm lint

  unit:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        env:
          STOKEN_SECRET: ci-test-secret

  integration:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

  e2e:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      # Build via the same bake target as publish.yml — single source of
      # truth for context/dockerfile/args/cache. Override platforms to
      # amd64-only (no QEMU needed; can use `load: true` since multi-arch
      # loads aren't supported), the tag to the e2e-local name, and the
      # cache scopes to amd64 only — otherwise an amd64-only build would
      # write amd64 layers into the `scope=arm64` cache and degrade arm64
      # cache hits in the next publish run.
      - uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        env:
          # Disable provenance/SBOM attestations — they attach as a manifest
          # list, which `--load` into the docker daemon cannot import.
          WITH_ATTEST: "false"
        with:
          source: .
          files: ./docker-bake.hcl
          targets: app
          load: true
          set: |
            app.platform=linux/amd64
            app.tags=spreadsheet:ci
            app.cache-from=type=gha,scope=amd64
            app.cache-to=type=gha,scope=amd64,mode=max
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Get Playwright version
        id: pw-version
        run: |
          set -euo pipefail
          PW_VERSION=$(npx playwright --version)
          echo "Playwright: $PW_VERSION"
          [[ "$PW_VERSION" =~ ^Version\ [0-9]+\.[0-9]+ ]] || { echo "Unexpected format: $PW_VERSION"; exit 1; }
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.pw-version.outputs.version }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
      - name: Install Chromium OS deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2t64
      - run: pnpm test:e2e
        env:
          CI: true
          E2E_IMAGE: spreadsheet:ci
          TESTCONTAINERS_RYUK_DISABLED: true

  visual:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Pull the Playwright image so screenshots render identically
      # across dev machines and CI (same fonts, libraries, Chromium).
      - name: Pull Playwright Docker image
        run: docker pull mcr.microsoft.com/playwright:v1.59.1-noble
      - run: pnpm test:visual:docker
        env:
          CI: true
          TESTCONTAINERS_RYUK_DISABLED: true
      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-diff
          path: test-results/
          retention-days: 7

  release:
    needs: [unit, integration, e2e, visual]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'iskhakovt/spreadsheet'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.published }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          npx --yes \
            -p semantic-release@25.0.3 \
            -p @semantic-release/commit-analyzer@13.0.1 \
            -p @semantic-release/release-notes-generator@14.1.0 \
            -p @semantic-release/github@12.0.6 \
            semantic-release
          if git describe --exact-match --tags HEAD >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish Image
    # `needs:` is required even though `if:` references the same job:
    # without it the outputs context is empty and `if:` silently false.
    needs: [release]
    if: needs.release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/publish.yml
    # Keep in sync with the docker job in publish.yml.
    permissions:
      contents: read
      packages: write
