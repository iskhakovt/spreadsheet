name: GHCR Cleanup

on:
  schedule:
    # Weekly, Sundays 04:00 UTC.
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  cleanup:
    name: Prune old container versions
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Keep the 20 most recent tagged versions; delete older tagged ones.
          keep-n-tagged: 20
          # Delete untagged manifests older than 14 days. Multi-arch children
          # referenced by a kept manifest list are preserved automatically.
          older-than: 14 days
          delete-untagged: true
