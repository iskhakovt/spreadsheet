name: GHCR Cleanup

on:
  schedule:
    # Weekly, Sundays 04:00 UTC.
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  cleanup:
    name: Prune old container versions
    runs-on: ubuntu-latest
    concurrency:
      group: ghcr-cleanup-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      packages: write
    steps:
      - uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86 # v1.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Keep the 20 most recent tagged versions; delete older tagged ones.
          keep-n-tagged: 20
          # Delete untagged manifests older than 14 days. Multi-arch children
          # referenced by a kept manifest list are preserved automatically.
          older-than: 14 days
          delete-untagged: true
