name: Publish

on:
  workflow_call:
  workflow_dispatch:

# Deny-by-default; the docker job grants what it needs.
permissions: {}

jobs:
  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    concurrency:
      group: publish-image
      cancel-in-progress: false
    # Keep in sync with the calling job in ci.yml.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - id: version
        run: |
          set -euo pipefail
          echo "version=$(pipx run dunamai==1.26.1 from any --style semver)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          bake-target: app
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}

      # binfmt_misc + QEMU for arm64-on-amd64 emulation. ubuntu-latest does
      # not pre-register QEMU, and setup-buildx-action does not either.
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
        with:
          source: .
          files: |
            ./docker-bake.hcl
            ${{ steps.meta.outputs.bake-file }}
          targets: app
          push: true
          set: |
            app.args.VERSION=${{ steps.version.outputs.version }}
